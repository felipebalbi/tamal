name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hdl:
    name: HDL (Clash + hedgehog)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hdl
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          enable-stack: true
          stack-version: latest

      - name: Cache stack + GHC + Clash
        uses: actions/cache@v4
        with:
          path: |
            ~/.stack
            hdl/.stack-work
          key: stack-${{ runner.os }}-${{ hashFiles('hdl/stack.yaml.lock', 'hdl/tamal.cabal') }}
          restore-keys: |
            stack-${{ runner.os }}-

      - name: Build
        run: stack build --test --no-run-tests

      - name: Test (hedgehog)
        run: stack test

      - name: Clash -> Verilog codegen smoke
        run: stack run clash -- Tamal --verilog

  haskell-format:
    name: Haskell format (fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads hdl/fourmolu.yaml (per-file upward search) and hdl/tamal.cabal
      # (for default-extensions). Pin the version so CI matches local installs.
      - uses: haskell-actions/run-fourmolu@v11
        with:
          version: "0.16.2.0"
          pattern: |
            hdl/**/*.hs

  rust:
    name: Rust (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check
