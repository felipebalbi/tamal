name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hdl:
    name: HDL (Clash + hedgehog)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hdl
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup
        with:
          ghc-version: '9.10.3'
          cabal-version: 'latest'

      - name: Cache cabal store + dist-newstyle
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.setup.outputs.cabal-store }}
            hdl/dist-newstyle
          key: cabal-${{ runner.os }}-${{ hashFiles('hdl/cabal.project.freeze', 'hdl/cabal.project', 'hdl/tamal.cabal') }}
          restore-keys: |
            cabal-${{ runner.os }}-

      - name: Update package index
        run: cabal update

      - name: Build
        run: cabal build --enable-tests all

      - name: Test (hedgehog)
        run: cabal test all

      - name: Clash -> Verilog codegen smoke
        run: cabal run clash -- Tamal --verilog

  haskell-format:
    name: Haskell format (fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads hdl/fourmolu.yaml (per-file upward search) and hdl/tamal.cabal
      # (for default-extensions). Pin the version so CI matches local installs.
      # Requires >= v13: fourmolu 0.20.0.0 ships .zip archives, and only
      # run-fourmolu v13+ downloads/extracts them (v11 fetched a bare binary URL
      # that now 404s, which the action mislabels as "detected unformatted files").
      - uses: haskell-actions/run-fourmolu@v13
        with:
          version: "0.20.0.0"
          pattern: |
            hdl/**/*.hs

  rust:
    name: Rust (workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tamal-loader depends on serialport v4, which links libudev on Linux
      # (libudev-sys) and probes it via pkg-config. Without these the build
      # fails with "The system library `libudev` required by crate ... was not
      # found."
      - name: Install libudev (serialport build dep)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check
