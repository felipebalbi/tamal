###############################################################################
#
# Required tooling for building the tamal gateware and targeting the Digilent
# Arty A7-100T (Xilinx Artix-7, xc7a100tcsg324-1) with Vivado.
#
# Don't modify this file directly. Instead, copy it to `build.cfg.local` and
# introduce any required changes there (build.cfg.local takes precedence and is
# gitignored).
#
# The Haskell side uses cabal; the bitstream side uses Vivado (any recent
# version with Artix-7 support).
###############################################################################

# Clash -> Verilog (via cabal). `-v0` keeps cabal's build chatter out of the
# codegen step so only Clash's own output shows.
CLASH = cabal run -v0 clash --

# Haskell unit tests.
TEST = cabal test

# Haskell formatter. Style lives in hdl/fourmolu.yaml. Install with
# `cabal install fourmolu` or grab a static binary from the fourmolu releases.
FOURMOLU = fourmolu

# Xilinx Vivado. Defaults to `vivado` on PATH. If it isn't on PATH, override in
# build.cfg.local, e.g.:
#   VIVADO = /opt/Xilinx/Vivado/2024.1/bin/vivado
# or on Windows:
#   VIVADO = /c/Xilinx/Vivado/2024.1/bin/vivado
VIVADO = vivado

# Digilent Adept 2 Utilities — `djtgcfg` programs the Arty's on-board FTDI JTAG
# directly (used by `make load`); no Vivado hardware manager required. Install
# Adept 2 Utilities (https://digilent.com/reference/software/adept/start); the
# installer puts djtgcfg on PATH. Override here or in build.cfg.local if it is
# not on PATH (use a path without spaces, or add its dir to PATH).
DJTGCFG = djtgcfg

# Quartus Prime (Cyclone V / C5G, BOARD=cyclonev). Defaults assume quartus_* are on
# PATH. If your install isn't on PATH, override in build.cfg.local, e.g.
#   QUARTUS_SH = /home/you/altera_lite/25.1std/quartus/bin/quartus_sh
QUARTUS_SH  = quartus_sh
QUARTUS_MAP = quartus_map
QUARTUS_FIT = quartus_fit
QUARTUS_ASM = quartus_asm
QUARTUS_STA = quartus_sta
QUARTUS_PGM = quartus_pgm
QUARTUS_CPF = quartus_cpf

###############################################################################
